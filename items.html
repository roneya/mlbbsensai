<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Legends Items</title>
<link rel="icon" type="image/png" href="ic.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d1a;--bg2:#1a1a2e;--bg3:#20203a;
  --gold:#f0a500;--text:#eee;--muted:#999;--green:#66bb6a;
  --border:#252545;--r:10px;
}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:14px 16px}

/* topbar */
.topbar{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 18px;margin-bottom:10px}
.topbar h1{font-size:1.15rem;font-weight:700;color:var(--gold);letter-spacing:1px}
.nav-link{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-size:.8rem;text-decoration:none;transition:all .15s}
.nav-link:hover{color:var(--text);border-color:#555}

/* filter bar */
.filter-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:10px;display:flex;flex-direction:column;gap:10px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-bar{flex:1;min-width:180px;padding:8px 13px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:.85rem;outline:none;transition:border-color .15s}
.search-bar:focus{border-color:var(--gold)}
.sort-sel{padding:8px 11px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:.82rem;outline:none;cursor:pointer}
.cat-btns{display:flex;gap:6px;flex-wrap:wrap}
.cat-btn{padding:5px 14px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;font-size:.8rem;transition:all .15s}
.cat-btn:hover{color:var(--text);border-color:#555}
.cat-btn.active{background:rgba(240,165,0,.15);border-color:var(--gold);color:var(--gold)}

/* section headers */
.section-header{font-size:1rem;font-weight:700;color:var(--gold);padding:5px 0 8px;margin-top:16px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-header:first-child{margin-top:0}
.section-count{font-size:.72rem;color:var(--muted);font-weight:400}

/* item grid — hero-card style */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px;margin-bottom:4px}
.card{background:var(--bg3);border:2px solid transparent;border-radius:7px;padding:8px 6px;cursor:pointer;text-align:center;transition:all .13s}
.card:hover{background:#2a2a40;border-color:var(--gold);box-shadow:0 0 10px rgba(240,165,0,.25);transform:translateY(-1px)}
.card-img{width:56px;height:56px;border-radius:8px;object-fit:cover;background:var(--bg2);border:1px solid var(--border);display:block;margin:0 auto 6px}
.card-name{font-size:.67rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.card-price{font-size:.63rem;color:var(--gold);margin-top:2px;font-weight:600}
.card-cat-badge{font-size:.58rem;padding:1px 6px;border-radius:10px;background:rgba(240,165,0,.12);color:var(--gold);margin-top:3px;display:inline-block}

.no-results{grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)}

/* stats glossary */
.glossary-panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px}
.glossary-title{font-size:.95rem;font-weight:700;color:var(--gold);margin-bottom:12px}
.glossary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.gloss-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.gloss-term{font-size:.82rem;font-weight:700;color:var(--text)}
.gloss-aka{font-size:.65rem;color:var(--gold);margin-left:6px;font-weight:500}
.gloss-desc{font-size:.74rem;color:var(--muted);line-height:1.45;margin-top:4px}
.modal-stat .label{cursor:help;border-bottom:1px dotted transparent}
.modal-stat .label[title]{border-bottom-color:var(--border)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;padding:22px;position:relative;box-shadow:0 0 40px rgba(240,165,0,.12)}
.modal-close{position:absolute;top:13px;right:15px;background:none;border:none;color:var(--muted);font-size:1.5rem;line-height:1;cursor:pointer}
.modal-close:hover{color:var(--text)}
.modal-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.modal-img{width:76px;height:76px;border-radius:10px;object-fit:cover;background:var(--bg3);border:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:5px}
.modal-cat{font-size:.7rem;padding:2px 9px;border-radius:20px;background:rgba(240,165,0,.15);color:var(--gold);font-weight:600}
.modal-sec-title{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:13px 0 7px}
.modal-stat{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.83rem}
.modal-stat:last-child{border-bottom:none}
.modal-stat .label{color:var(--muted)}
.modal-stat .val{color:var(--gold);font-weight:600}
.modal-price{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.modal-price .label{color:var(--muted);font-size:.8rem}
.modal-price .val{color:var(--gold);font-weight:700;font-size:1.15rem}
.modal-passive{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.passive-name{color:var(--green);font-weight:600;font-size:.85rem;margin-bottom:4px}
.passive-desc{color:var(--muted);font-size:.78rem;line-height:1.5}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <h1>⚔ Mobile Legends Items</h1>
    <a href="index.html" class="nav-link">← Draft Tool</a>
    <button id="glossaryBtn" class="nav-link" style="cursor:pointer;margin-left:auto">📖 Stats Guide</button>
  </div>

  <div id="glossaryPanel" class="glossary-panel" style="display:none"></div>

  <div class="filter-bar">
    <div class="filter-row">
      <input id="search" class="search-bar" placeholder="Search items by name…" autocomplete="off">
      <select id="sortSel" class="sort-sel">
        <option value="name">Sort by Name</option>
        <option value="price">Price: Low → High</option>
        <option value="priceDesc">Price: High → Low</option>
        <option value="hp">Highest HP</option>
        <option value="physAtk">Highest Physical Attack</option>
        <option value="magPow">Highest Magic Power</option>
        <option value="physDef">Highest Physical Defense</option>
        <option value="magDef">Highest Magic Defense</option>
        <option value="atkSpd">Highest Attack Speed</option>
        <option value="cdr">Cooldown Reduction</option>
        <option value="moveSpd">Movement Speed</option>
        <option value="pen">Penetration</option>
        <option value="lifesteal">Lifesteal</option>
      </select>
    </div>
    <div class="cat-btns" id="catBtns">
      <button class="cat-btn active" data-cat="All">All</button>
      <button class="cat-btn" data-cat="Defense">Defense</button>
      <button class="cat-btn" data-cat="Movement">Movement</button>
      <button class="cat-btn" data-cat="Magic">Magic</button>
      <button class="cat-btn" data-cat="Attack">Attack</button>
    </div>
  </div>

  <div id="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-head">
      <img class="modal-img" id="mImg" src="" alt="">
      <div>
        <div class="modal-title" id="mName"></div>
        <span class="modal-cat" id="mCat"></span>
      </div>
    </div>
    <div id="mStats"></div>
    <div id="mPassive"></div>
    <div class="modal-price">
      <span class="label">Total Cost</span>
      <span class="val" id="mPrice"></span>
    </div>
  </div>
</div>

<script>
let ITEMS = [], GLOSSARY = [], GLOSS_BY_TERM = {}, activeCat = 'All', query = '';

fetch('items.json')
  .then(r => r.json())
  .then(data => {
    ITEMS = data.items;
    GLOSSARY = data.glossary || [];
    GLOSS_BY_TERM = {};
    GLOSSARY.forEach(g => { GLOSS_BY_TERM[g.term] = g; });
    renderGlossary();
    apply();
  });

function renderGlossary() {
  const panel = document.getElementById('glossaryPanel');
  panel.innerHTML = `<div class="glossary-title">📖 Understanding Item Stats</div>
    <div class="glossary-grid">${GLOSSARY.map(g => `
      <div class="gloss-item">
        <span class="gloss-term">${g.term}</span><span class="gloss-aka">${g.aka}</span>
        <div class="gloss-desc">${g.desc}</div>
      </div>`).join('')}</div>`;
}

document.getElementById('glossaryBtn').addEventListener('click', () => {
  const p = document.getElementById('glossaryPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
});

function statVal(stats, re) {
  for (const s of stats) {
    const m = s.match(re);
    if (m) return parseFloat(m[1].replace(/,/g,''));
  }
  return -1;
}

function apply() {
  const q = query.toLowerCase();
  let list = ITEMS.filter(it => {
    if (activeCat !== 'All' && it.cat !== activeCat) return false;
    if (q && !it.name.toLowerCase().includes(q)) return false;
    return true;
  });

  const mode = document.getElementById('sortSel').value;
  list.sort((a,b) => {
    switch(mode) {
      case 'price':     return a.price - b.price;
      case 'priceDesc': return b.price - a.price;
      case 'name':      return a.name.localeCompare(b.name);
      case 'hp':        return statVal(b.stats,/\+([\d,]+)\s*HP/i)                - statVal(a.stats,/\+([\d,]+)\s*HP/i);
      case 'physAtk':   return statVal(b.stats,/\+([\d,]+)\s*Physical Attack/i)   - statVal(a.stats,/\+([\d,]+)\s*Physical Attack/i);
      case 'magPow':    return statVal(b.stats,/\+([\d,]+)\s*Magic Power/i)        - statVal(a.stats,/\+([\d,]+)\s*Magic Power/i);
      case 'physDef':   return statVal(b.stats,/\+([\d,]+)\s*Physical Defense/i)  - statVal(a.stats,/\+([\d,]+)\s*Physical Defense/i);
      case 'magDef':    return statVal(b.stats,/\+([\d,]+)\s*Magic Defense/i)     - statVal(a.stats,/\+([\d,]+)\s*Magic Defense/i);
      case 'atkSpd':    return statVal(b.stats,/\+([\d,]+)%?\s*Attack Speed/i)    - statVal(a.stats,/\+([\d,]+)%?\s*Attack Speed/i);
      case 'cdr':       return statVal(b.stats,/\+([\d,]+)%?\s*CD/i)              - statVal(a.stats,/\+([\d,]+)%?\s*CD/i);
      case 'moveSpd':   return statVal(b.stats,/\+([\d,]+)%?\s*Movement/i)        - statVal(a.stats,/\+([\d,]+)%?\s*Movement/i);
      case 'pen':       return statVal(b.stats,/\+([\d,]+)%?\s*Penetration/i)     - statVal(a.stats,/\+([\d,]+)%?\s*Penetration/i);
      case 'lifesteal': return statVal(b.stats,/\+([\d,]+)%?\s*Lifesteal/i)       - statVal(a.stats,/\+([\d,]+)%?\s*Lifesteal/i);
      default: return 0;
    }
  });

  const container = document.getElementById('grid');
  if (!list.length) {
    container.innerHTML = '<div class="no-results">No items found.</div>';
    return;
  }

  const cardHtml = it => `
    <div class="card" data-idx="${ITEMS.indexOf(it)}">
      <img class="card-img" src="${it.img}" alt="${it.name}" onerror="this.style.background='var(--bg2)'">
      <div class="card-name">${it.name}</div>
      <div class="card-price">💰 ${it.price}</div>
    </div>`;

  if (activeCat !== 'All' || query) {
    container.innerHTML = `<div class="grid">${list.map(cardHtml).join('')}</div>`;
    return;
  }

  const ORDER = ['Movement', 'Attack', 'Magic', 'Defense'];
  const CAT_ICON = { Movement: '👟', Attack: '⚔️', Magic: '✦', Defense: '🛡️' };
  const grouped = {};
  list.forEach(it => { (grouped[it.cat] = grouped[it.cat] || []).push(it); });
  const sections = ORDER.filter(c => grouped[c]).concat(Object.keys(grouped).filter(c => !ORDER.includes(c)));

  container.innerHTML = sections.map(cat => `
    <div class="section-header">
      ${CAT_ICON[cat] || '•'} ${cat} <span class="section-count">${grouped[cat].length} items</span>
    </div>
    <div class="grid">${grouped[cat].map(cardHtml).join('')}</div>
  `).join('');
}

document.getElementById('search').addEventListener('input', e => { query = e.target.value.trim(); apply(); });
document.getElementById('sortSel').addEventListener('change', apply);
document.getElementById('catBtns').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  apply();
});

const overlay = document.getElementById('overlay');

function openModal(it) {
  document.getElementById('mImg').src = it.img;
  document.getElementById('mImg').alt = it.name;
  document.getElementById('mName').textContent = it.name;
  document.getElementById('mCat').textContent = it.cat;
  document.getElementById('mPrice').textContent = '💰 ' + it.price;

  const statsEl = document.getElementById('mStats');
  statsEl.innerHTML = '<div class="modal-sec-title">Attributes</div>' +
    (it.stats.length
      ? it.stats.map(s => {
          const m = s.match(/^(\+[\d,]+%?)\s+(.*)$/);
          const label = m ? m[2] : s;
          const g = GLOSS_BY_TERM[label];
          const tip = g ? ` title="${g.aka} — ${g.desc}"` : '';
          return m
            ? `<div class="modal-stat"><span class="label"${tip}>${label}</span><span class="val">${m[1]}</span></div>`
            : `<div class="modal-stat"><span class="label"${tip}>${label}</span></div>`;
        }).join('')
      : '<div class="modal-stat"><span class="label">No attributes</span></div>');

  const passEl = document.getElementById('mPassive');
  if (it.passive_name || it.passive_description) {
    passEl.innerHTML =
      `<div class="modal-sec-title">Passive</div>
       <div class="modal-passive">
         ${it.passive_name ? `<div class="passive-name">◆ ${it.passive_name}</div>` : ''}
         ${it.passive_description ? `<div class="passive-desc">${it.passive_description}</div>` : ''}
       </div>`;
  } else {
    passEl.innerHTML = '';
  }

  overlay.classList.add('open');
}

function closeModal() { overlay.classList.remove('open'); }

document.getElementById('grid').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const it = ITEMS[+card.dataset.idx];
  if (it) openModal(it);
});
document.getElementById('modalClose').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
